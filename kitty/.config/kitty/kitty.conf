# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
#
#
font_family      Hack Regular 
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 11

# background #090909
# background #0E1111
background #0D0208

background_opacity .6
background_blur 3

clear_all_shortcuts yes 

#
dynamic_background_opacity yes
map ctrl+shift+l set_background_opacity +0.1
map ctrl+shift+h set_background_opacity -0.1
map ctrl+shift+n set_background_opacity default


cursor_shape block

# AUMENTAR TAMAÑO DE FUENTE
map ctrl+plus change_font_size all +1.0
# DISMINUIR TAMAÑO DE FUENTE
map ctrl+minus change_font_size all -1.0

# RESETEAR AL TAMAÑO ORIGINAL
map ctrl+0 change_font_size all 0

# scroll
map alt+ctrl+k scroll_line_up
# Scroll hacia arriba con Alt+k
# Abre el historial en un "pager" (Neovim)
# map alt+s show_scrollback
# scrollback_pager nvim -c "set signcolumn=no showtabline=0" -c "silent write! /tmp/kitty_scrollback" -c "terminal cat /tmp/kitty_scrollback"
# Scroll hacia abajo con Alt+j
map alt+ctrl+j scroll_line_down

# windows
enabled_layouts splits,stack,fat,tall
# Dividir la ventana (estilo horizontal y vertical)
map ctrl+enter launch --cwd=current --location=vsplit 
map ctrl+shift+enter launch --cwd=current --location=hsplit

# Moverse entre ventanas internas de Kitty
map alt+h neighboring_window left
map alt+l neighboring_window right
map alt+k neighboring_window up
map alt+j neighboring_window down

# Mover la ventana actual (intercambiar posición)
map ctrl+super+j move_window down
map ctrl+super+k move_window up
map ctrl+super+h move_window left
map ctrl+super+l move_window right

# Muestra un número/letra sobre cada ventana para saltar a ella
# Esto abre un selector visual de ventanas
map alt+f focus_visible_window
# Redimensionar ventanas con Alt + Shift + Flechas (o HJKL)
map alt+shift+l resize_window healthier 2
map alt+shift+h resize_window narrower 2
map alt+shift+k resize_window taller 2
map alt+shift+j resize_window shorter 2
map alt+r start_resizing_window
draw_minimal_borders yes
window_border_width 1pt
active_border_color #a6e3a1
inactive_border_color #45475a
# Hace que las ventanas inactivas se vean más oscuras/transparentes
inactive_text_alpha 0.5
# Con Alt+0 maximizas la ventana actual, con otro Alt+Z vuelves a ver todas
map alt+0 toggle_layout stack

# Resetear el tamaño de todas las ventanas al original
map alt+shift+r resize_window reset



# tabs
tab_bar_edge top
tab_title_template      "{index}:󰞷  {title}"

# Colores de las Tabs (Ejemplo de colores vivos)
active_tab_foreground   #a6e3a1
active_tab_background   #0E1111
active_tab_font_style   bold-italic
inactive_tab_foreground #45475a
inactive_tab_background #000
inactive_tab_font_style normal
tab_bar_style       fade
tab_fade            0.25 0.5 0.75 1
tab_separator       |
# CERRAR TAB CON ALT+Q (CUIDADO SI LO USAS EN OTRO LADO)
map alt+q close_tab
# CAMBIAR EL NOMBRE A LA PESTAÑA ACTUAL (MUY ÚTIL PARA ORGANIZAR PROYECTOS)
map alt+i set_tab_title
map alt+t>n new_tab
map alt+t>c launch --type=tab --cwd=current
map alt+t>w close_tab
map alt+t>l next_tab
map alt+t>Tab next_tab
map alt+t>h previous_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9


# INTERACTIVE
# ABRIR URLS CON EL TECLADO
map alt+e open_url_with_hints

# COPIAR UNA RUTA DE ARCHIVO O UNA PALABRA AL PORTAPAPELES
map alt+p>p kitten hints --type path --program @
map alt+p>w kitten hints --type word --program @
map alt+p>l kitten hints --type line --program @

# COPIAR AUTOMÁTICAMENTE AL SELECCIONAR CON EL MOUSE
copy_on_select yes

# ELIMINAR ESPACIOS EN BLANCO AL FINAL AL COPIAR
strip_trailing_spaces smart

# HACER QUE EL CLICK DERECHO PEGUE (ESTILO TERMINAL CLÁSICA)
# mouse_map right press ungrabbed paste_from_selection
mouse_map right press ungrabbed paste_from_clipboard

map shift+insert paste_from_clipboard
# map ctrl+v paste_from_clipboard

allow_remote_control yes
listen_on unix:/tmp/mykitty

map f2 save_as_session --save-only --use-foreground-process --relocatable "/home/villegas/kitty-sessions/last-work.conf"
map f3 save_as_session --save-only --use-foreground-process --relocatable 
