# Título de la primera pestaña
new_tab nvim
cd ~/git/works/centro-clinico/desktop-apps
# Lanzamos bash para que la pestaña se quede abierta
launch bash -c "nvim; exec bash"

# Segunda pestaña
new_tab opencode
cd ~/git/works/centro-clinico/desktop-apps
# Aquí podrías lanzar nvim directamente, pero al cerrar nvim se cerraría la pestaña
# a menos que lo hagas así:
launch bash -c "opencode; exec bash"
