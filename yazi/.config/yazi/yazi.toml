# yazi.toml
[manager]
# show_hidden = true

[plugin]
prepend_previewers = [
  { mime = "audio/*",   run = "exifaudio"},
  { mime = "{image,video}/*", run = "mediainfo"},
  { mime = "application/x-subrip", run = "mediainfo"},
  # { mime = "audio/*",   run = "exifaudio"},
  { mime = "text/csv", run = "miller"},
  { mime = "application/*zip",            run = "ouch" },
  { mime = "application/x-tar",           run = "ouch" },
  { mime = "application/x-bzip2",         run = "ouch" },
  { mime = "application/x-7z-compressed", run = "ouch" },
  { mime = "application/x-rar",           run = "ouch" },
  { mime = "application/x-xz",            run = "ouch" },
  { name = "*.csv", run = "rich-preview"}, # for csv files
  { name = "*.md", run = "rich-preview" }, # for markdown (.md) files
  { name = "*.rst", run = "rich-preview"}, # for restructured text (.rst) files
  { name = "*.ipynb", run = "rich-preview"}, # for jupyter notebooks (.ipynb)
  { name = "*.json", run = "rich-preview"}, # for json (.json) files
  { name = "*.tsx", run = "rich-preview"}, # for json (.json) files
  { name = "*.jsx", run = "rich-preview"}, # for json (.json) files
  { name = "*.js", run = "rich-preview"}, # for json (.json) files
  # { name = "*.*", run = "rich-preview"}, # for json (.json) files
#    { name = "*.lang_type", run = "rich-preview"} # for particular language files eg. .py, .go., .lua, etc.
]


[opener]
play = [
	{ run = 'vlc "$@"' },
]
# edit = [
# 	{ run = '$EDITOR "$@"', block = true, for = "unix" },
# 	{ run = "%EDITOR% %*",  block = true, for = "windows" },
# ]
drawio = [
	# { run = 'xdg-open "$@"', desc = "Open" },
	{ run = 'drawio "$@"' },
]
# ...
[open]
prepend_rules = [
	{ name = "*.mp4", use = "play" },
  { name = "*.drawio", use = "drawio"},

	# Multiple openers for a single rule
	# { name = "*.html", use = [ "open", "edit" ] },
]
