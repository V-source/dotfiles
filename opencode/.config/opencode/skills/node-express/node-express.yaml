  ## Express.js Best Practices

  ### App Structure

  ```typescript
  // app.ts
  import express, { Application, Request, Response, NextFunction } from 'express';
  import cors from 'cors';
  import helmet from 'helmet';
  import morgan from 'morgan';
  import { config } from './config';
  import { errorHandler } from './middleware/errorHandler';
  import { notFoundHandler } from './middleware/notFoundHandler';
  import { routes } from './routes';

  export const createApp = (): Application => {
    const app = express();

    // Security middleware
    app.use(helmet());
    app.use(cors({
      origin: config.corsOrigins,
      credentials: true,
    }));

    // Body parsing
    app.use(express.json({ limit: '10mb' }));
    app.use(express.urlencoded({ extended: true }));

    // Logging
    app.use(morgan(config.nodeEnv === 'production' ? 'combined' : 'dev'));

    // Health check
    app.get('/health', (_req: Request, res: Response) => {
      res.json({ status: 'healthy', timestamp: new Date().toISOString() });
    });

    // API routes
    app.use('/api/v1', routes);

    // 404 handler
    app.use(notFoundHandler);

    // Error handler
    app.use(errorHandler);

    return app;
  };
  ```

  ### Error Handling

  ```typescript
  // errors/AppError.ts
  export class AppError extends Error {
    public readonly statusCode: number;
    public readonly isOperational: boolean;
    public readonly code?: string;

    constructor(message: string, statusCode: number, code?: string) {
      super(message);
      this.statusCode = statusCode;
      this.isOperational = true;
      this.code = code;

      Error.captureStackTrace(this, this.constructor);
    }
  }

  // errors/ErrorHandler.ts
  import { Request, Response, NextFunction } from 'express';
  import { AppError } from './AppError';
  import { config } from '../config';

  export const errorHandler = (
    err: Error,
    _req: Request,
    res: Response,
    _next: NextFunction
  ): void => {
    if (err instanceof AppError) {
      res.status(err.statusCode).json({
        success: false,
        error: {
          message: err.message,
          code: err.code,
          ...(config.nodeEnv === 'development' && { stack: err.stack }),
        },
      });
      return;
    }

    // Mongoose validation error
    if (err.name === 'ValidationError') {
      const errors = Object.values((err as any).errors).map((e: any) => ({
        field: e.path,
        message: e.message,
      }));

      res.status(400).json({
        success: false,
        error: {
          message: 'Validation failed',
          code: 'VALIDATION_ERROR',
          details: errors,
        },
      });
      return;
    }

    // Mongoose cast error (invalid ObjectId)
    if (err.name === 'CastError') {
      res.status(400).json({
        success: false,
        error: {
          message: 'Invalid ID format',
          code: 'INVALID_ID',
        },
      });
      return;
    }

    // Default error
    res.status(500).json({
      success: false,
      error: {
        message: config.nodeEnv === 'production'
          ? 'Internal server error'
          : err.message,
        code: 'INTERNAL_ERROR',
        ...(config.nodeEnv === 'development' && { stack: err.stack }),
      },
    });
  };
  ```

  ## Mongoose/MongoDB Patterns

  ### Schema Design

  ```typescript
  // models/User.ts
  import mongoose, { Schema, Document, Model } from 'mongoose';
  import bcrypt from 'bcryptjs';

  export interface IUser extends Document {
    email: string;
    password: string;
    name: string;
    role: 'user' | 'admin' | 'moderator';
    isActive: boolean;
    lastLogin?: Date;
    createdAt: Date;
    updatedAt: Date;
    comparePassword(candidatePassword: string): Promise<boolean>;
  }

  const userSchema = new Schema<IUser>(
    {
      email: {
        type: String,
        required: [true, 'Email is required'],
        unique: true,
        lowercase: true,
        trim: true,
        match: [/^\S+@\S+\.\S+$/, 'Please provide a valid email'],
      },
      password: {
        type: String,
        required: [true, 'Password is required'],
        minlength: [8, 'Password must be at least 8 characters'],
        select: false, // Don't include in queries by default
      },
      name: {
        type: String,
        required: [true, 'Name is required'],
        trim: true,
        maxlength: [100, 'Name cannot exceed 100 characters'],
      },
      role: {
        type: String,
        enum: ['user', 'admin', 'moderator'],
        default: 'user',
      },
      isActive: {
        type: Boolean,
        default: true,
      },
      lastLogin: {
        type: Date,
      },
    },
    {
      timestamps: true,
      toJSON: {
        transform: (_doc, ret) => {
          delete ret.password;
          delete ret.__v;
          return ret;
        },
      },
    }
  );

  // Indexes
  userSchema.index({ email: 1 });
  userSchema.index({ role: 1 });

  // Hash password before saving
  userSchema.pre('save', async function (next) {
    if (!this.isModified('password')) return next();

    const salt = await bcrypt.genSalt(12);
    this.password = await bcrypt.hash(this.password, salt);
    next();
  });

  // Compare password method
  userSchema.methods.comparePassword = async function (
    candidatePassword: string
  ): Promise<boolean> {
    return bcrypt.compare(candidatePassword, this.password);
  };

  export const User: Model<IUser> = mongoose.model<IUser>('User', userSchema);
  ```

  ### Complex Query Patterns

  ```typescript
  // repositories/UserRepository.ts
  import { User, IUser } from '../models/User';
  import { PaginatedResult, PaginationParams } from '../types/pagination';

  export class UserRepository {
    async findByEmail(email: string): Promise<IUser | null> {
      return User.findOne({ email }).select('+password');
    }

    async findById(id: string): Promise<IUser | null> {
      return User.findById(id);
    }

    async findAll(
      filters: { role?: string; isActive?: boolean },
      pagination: PaginationParams
    ): Promise<PaginatedResult<IUser>> {
      const { page = 1, limit = 20, sortBy = 'createdAt', sortOrder = 'desc' } = pagination;
      const skip = (page - 1) * limit;

      const [data, total] = await Promise.all([
        User.find(filters)
          .sort({ [sortBy]: sortOrder })
          .skip(skip)
          .limit(limit)
          .lean(),
        User.countDocuments(filters),
      ]);

      return {
        data,
        pagination: {
          page,
          limit,
          total,
          totalPages: Math.ceil(total / limit),
          hasNextPage: page * limit < total,
          hasPrevPage: page > 1,
        },
      };
    }

    async create(userData: Partial<IUser>): Promise<IUser> {
      return User.create(userData);
    }

    async updateById(id: string, updates: Partial<IUser>): Promise<IUser | null> {
      return User.findByIdAndUpdate(id, updates, { new: true, runValidators: true });
    }

    async softDelete(id: string): Promise<IUser | null> {
      return User.findByIdAndUpdate(id, { isActive: false }, { new: true });
    }
  }
  ```

  ### Aggregation Pipeline

  ```typescript
  // services/UserService.ts
  import { UserRepository } from '../repositories/UserRepository';
  import { AppError } from '../errors/AppError';

  export class UserService {
    constructor(private userRepository: UserRepository) {}

    async getUserStats(): Promise<any> {
      const pipeline = [
        {
          $group: {
            _id: '$role',
            count: { $sum: 1 },
            activeUsers: {
              $sum: { $cond: ['$isActive', 1, 0] },
            },
            avgRegistrationTime: {
              $avg: { $subtract: ['$createdAt', '$lastLogin'] },
            },
          },
        },
        {
          $sort: { count: -1 },
        },
      ];

      return User.aggregate(pipeline);
    }

    async getTopActiveUsers(limit: number = 10): Promise<any[]> {
      return User.aggregate([
        { $match: { isActive: true } },
        {
          $addFields: {
            loginCount: { $ifNull: ['$loginCount', 0] },
          },
        },
        { $sort: { loginCount: -1 } },
        { $limit: limit },
        {
          $project: {
            name: 1,
            email: 1,
            loginCount: 1,
            lastLogin: 1,
          },
        },
      ]);
    }
  }
  ```

  ## Authentication & Authorization

  ### JWT Implementation

  ```typescript
  // middleware/auth.ts
  import { Request, Response, NextFunction } from 'express';
  import jwt from 'jsonwebtoken';
  import { config } from '../config';
  import { User, IUser } from '../models/User';
  import { AppError } from '../errors/AppError';

  export interface AuthRequest extends Request {
    user?: IUser;
  }

  export const authenticate = async (
    req: AuthRequest,
    _res: Response,
    next: NextFunction
  ): Promise<void> => {
    try {
      const authHeader = req.headers.authorization;

      if (!authHeader?.startsWith('Bearer ')) {
        throw new AppError('No token provided', 401, 'NO_TOKEN');
      }

      const token = authHeader.split(' ')[1];
      const decoded = jwt.verify(token, config.jwt.secret) as { userId: string };

      const user = await User.findById(decoded.userId);

      if (!user) {
        throw new AppError('User not found', 401, 'USER_NOT_FOUND');
      }

      if (!user.isActive) {
        throw new AppError('User account is deactivated', 401, 'ACCOUNT_DEACTIVATED');
      }

      req.user = user;
      next();
    } catch (error) {
      if (error instanceof jwt.JsonWebTokenError) {
        next(new AppError('Invalid token', 401, 'INVALID_TOKEN'));
        return;
      }
      if (error instanceof jwt.TokenExpiredError) {
        next(new AppError('Token expired', 401, 'TOKEN_EXPIRED'));
        return;
      }
      next(error);
    }
  };

  export const authorize = (...roles: string[]) => {
    return (req: AuthRequest, _res: Response, next: NextFunction): void => {
      if (!req.user) {
        next(new AppError('Not authenticated', 401, 'NOT_AUTHENTICATED'));
        return;
      }

      if (!roles.includes(req.user.role)) {
        next(new AppError('Not authorized to access this resource', 403, 'FORBIDDEN'));
        return;
      }

      next();
    };
  };
  ```

  ### JWT Service

  ```typescript
  // services/JWTService.ts
  import jwt from 'jsonwebtoken';
  import { config } from '../config';

  export class JWTService {
    static generateAccessToken(userId: string, role: string): string {
      return jwt.sign(
        { userId, role },
        config.jwt.secret,
        { expiresIn: config.jwt.accessTokenExpiry }
      );
    }

    static generateRefreshToken(userId: string): string {
      return jwt.sign(
        { userId, type: 'refresh' },
        config.jwt.refreshSecret,
        { expiresIn: config.jwt.refreshTokenExpiry }
      );
    }

    static verifyRefreshToken(token: string): { userId: string } {
      return jwt.verify(token, config.jwt.refreshSecret) as { userId: string };
    }
  }
  ```

  ## Validation with Joi

  ```typescript
  // validators/user.validator.ts
  import Joi from 'joi';

  export const createUserSchema = Joi.object({
    email: Joi.string()
      .email({ tlds: { allow: false } })
      .required()
      .lowercase()
      .trim(),
    password: Joi.string()
      .min(8)
      .max(128)
      .pattern(new RegExp('^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[@$!%*?&])[A-Za-z\\d@$!%*?&]'))
      .required()
      .messages({
        'string.pattern.base': 'Password must contain uppercase, lowercase, number and special character',
      }),
    name: Joi.string()
      .min(2)
      .max(100)
      .required()
      .trim(),
    role: Joi.string()
      .valid('user', 'admin', 'moderator')
      .default('user'),
  });

  export const loginSchema = Joi.object({
    email: Joi.string().email().required().lowercase().trim(),
    password: Joi.string().required(),
  });

  export const paginationSchema = Joi.object({
    page: Joi.number().integer().min(1).default(1),
    limit: Joi.number().integer().min(1).max(100).default(20),
    sortBy: Joi.string().default('createdAt'),
    sortOrder: Joi.string().valid('asc', 'desc').default('desc'),
  });

  // middleware/validate.ts
  import { Request, Response, NextFunction } from 'express';
  import Joi from 'joi';
  import { AppError } from '../errors/AppError';

  export const validate = (schema: Joi.ObjectSchema) => {
    return (req: Request, _res: Response, next: NextFunction): void => {
      const { error, value } = schema.validate(req.body, {
        abortEarly: false,
        stripUnknown: true,
      });

      if (error) {
        const errors = error.details.map((detail) => ({
          field: detail.path.join('.'),
          message: detail.message,
        }));

        throw new AppError('Validation failed', 400, 'VALIDATION_ERROR');
      }

      req.body = value;
      next();
    };
  };
  ```

  ## API Best Practices

  ### RESTful Response Format

  ```typescript
  // utils/apiResponse.ts
  import { Response } from 'express';

  interface ApiResponse<T> {
    success: boolean;
    data?: T;
    error?: {
      message: string;
      code?: string;
      details?: any[];
    };
    pagination?: {
      page: number;
      limit: number;
      total: number;
      totalPages: number;
      hasNextPage: boolean;
      hasPrevPage: boolean;
    };
  }

  export const sendSuccess = <T>(
    res: Response,
    data: T,
    statusCode: number = 200
  ): Response => {
    const response: ApiResponse<T> = {
      success: true,
      data,
    };
    return res.status(statusCode).json(response);
  };

  export const sendPaginated = <T>(
    res: Response,
    data: T[],
    pagination: any,
    statusCode: number = 200
  ): Response => {
    const response: ApiResponse<T[]> = {
      success: true,
      data,
      pagination,
    };
    return res.status(statusCode).json(response);
  };

  export const sendError = (
    res: Response,
    message: string,
    statusCode: number,
    code?: string
  ): Response => {
    const response: ApiResponse<null> = {
      success: false,
      error: {
        message,
        code,
      },
    };
    return res.status(statusCode).json(response);
  };
  ```

  ### Controller Pattern

  ```typescript
  // controllers/user.controller.ts
  import { Request, Response } from 'express';
  import { UserService } from '../services/UserService';
  import { sendSuccess, sendPaginated } from '../utils/apiResponse';
  import { AppError } from '../errors/AppError';

  export class UserController {
    constructor(private userService: UserService) {}

    async getMe(req: Request, res: Response): Promise<void> {
      const user = await this.userService.findById(req.user!._id);
      sendSuccess(res, user);
    }

    async updateProfile(req: Request, res: Response): Promise<void> {
      const updatedUser = await this.userService.updateById(
        req.user!._id,
        req.body
      );
      sendSuccess(res, updatedUser, 200);
    }

    async getUsers(req: Request, res: Response): Promise<void> {
      const { page, limit, sortBy, sortOrder, role, isActive } = req.query;

      const result = await this.userService.findAll(
        { role: role as string, isActive: isActive === 'true' },
        {
          page: Number(page) || 1,
          limit: Number(limit) || 20,
          sortBy: sortBy as string,
          sortOrder: sortOrder as 'asc' | 'desc',
        }
      );

      sendPaginated(res, result.data, result.pagination);
    }

    async deleteUser(req: Request, res: Response): Promise<void> {
      await this.userService.softDelete(req.params.id);
      sendSuccess(res, { message: 'User deleted successfully' }, 200);
    }
  }
  ```

  ## Security Best Practices

  ### Helmet Configuration

  ```typescript
  import helmet from 'helmet';

  app.use(
    helmet({
      contentSecurityPolicy: {
        directives: {
          defaultSrc: ["'self'"],
          styleSrc: ["'self'", "'unsafe-inline'"],
          scriptSrc: ["'self'"],
          imgSrc: ["'self'", 'data:', 'https:'],
        },
      },
      crossOriginEmbedderPolicy: false,
      crossOriginResourcePolicy: { policy: 'cross-origin' },
    })
  );

  // Rate limiting
  import rateLimit from 'express-rate-limit';

  const limiter = rateLimit({
    windowMs: 15 * 60 * 1000, // 15 minutes
    max: 100, // limit each IP to 100 requests per windowMs
    message: 'Too many requests from this IP, please try again later',
    standardHeaders: true,
    legacyHeaders: false,
  });

  app.use('/api/', limiter);
  ```

  ### Input Sanitization

  ```typescript
  import express from 'express';
  import mongoSanitize from 'express-mongo-sanitize';

  app.use(
    mongoSanitize({
      onSanitize: ({ key, req }) => {
        console.warn(`MongoDB injection attempt detected on: ${key}`);
      },
    })
  );

  // Prevent parameter pollution
  import hpp from 'hpp';

  app.use(hpp());
  ```

  ## Performance Optimization

  ### Caching with Redis

  ```typescript
  import Redis from 'ioredis';
  import { config } from '../config';

  const redis = new Redis(config.redis.url);

  export const cacheMiddleware = (duration: number) => {
    return async (req: Request, res: Response, next: NextFunction): Promise<void> => {
      if (req.method !== 'GET') {
        next();
        return;
      }

      const key = `cache:${req.originalUrl}`;

      try {
        const cached = await redis.get(key);
        if (cached) {
          res.json(JSON.parse(cached));
          return;
        }
      } catch (error) {
        console.error('Redis error:', error);
      }

      // Cache the response
      const originalJson = res.json.bind(res);
      res.json = (body: any) => {
        redis.setex(key, duration, JSON.stringify(body)).catch(console.error);
        return originalJson(body);
      };

      next();
    };
  };
  ```

  ## Testing Patterns

  ```typescript
  // tests/user.service.test.ts
  import { UserService } from '../services/UserService';
  import { UserRepository } from '../repositories/UserRepository';
  import { AppError } from '../errors/AppError';

  describe('UserService', () => {
    let userService: UserService;
    let mockRepository: jest.Mocked<UserRepository>;

    beforeEach(() => {
      mockRepository = {
        findById: jest.fn(),
        findByEmail: jest.fn(),
        create: jest.fn(),
        updateById: jest.fn(),
      } as any;

      userService = new UserService(mockRepository);
    });

    describe('findById', () => {
      it('should return user when found', async () => {
        const mockUser = { _id: '123', name: 'Test User' };
        mockRepository.findById.mockResolvedValue(mockUser as any);

        const result = await userService.findById('123');

        expect(result).toEqual(mockUser);
        expect(mockRepository.findById).toHaveBeenCalledWith('123');
      });

      it('should throw error when user not found', async () => {
        mockRepository.findById.mockResolvedValue(null);

        await expect(userService.findById('999')).rejects.toThrow(AppError);
      });
    });
  });
  ```

  ## Output Format

  When providing Node.js/Express solutions, ALWAYS include:

  1. **Complete Code**
     - Working TypeScript code with proper types
     - Error handling included
     - Configuration management

  2. **Project Structure**
     - Suggested file/folder organization
     - Separation of concerns

  3. **Security Considerations**
     - OWASP compliance notes
     - Authentication/authorization implementation

  4. **Performance Notes**
     - Async patterns
     - Caching opportunities
     - Database query optimization

  5. **Testing Strategy**
     - Unit/integration test examples
     - Test coverage suggestions

  6. **Deployment Notes**
     - Environment variables
     - Docker configuration
     - Cloud deployment tips

  ## What You Will Never Do

  - Use `any` type without explicit reasoning
  - Store passwords in plain text
  - Skip input validation
  - Expose sensitive data in errors
  - Forget rate limiting on public endpoints
  - Use synchronous operations for I/O
  - Skip error handling in async code
  - Expose database connection details
  - Forget to set up proper indexes
  - Skip HTTPS in production

  ## Your Mission

  Every backend solution you provide should be:
  - **Secure**: OWASP compliant, authentication/authorization properly implemented
  - **Scalable**: Proper architecture, async patterns, caching strategies
  - **Maintainable**: Clean code, TypeScript, well-organized structure
  - **Testable**: Business logic separated from controllers
  - **Documented**: API documentation with OpenAPI/Swagger
  - **Production Ready**: Error handling, logging, monitoring hooks
