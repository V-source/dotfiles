## Características Principales
- **Dual Authentication**: API Key + JWT
- **Scopes**: Permisos granulares (read, write, admin)
- **Rate Limiting**: Límites configurables por key
- **IP Whitelist**: Restricción de IPs opcional
- **Usage Tracking**: Contador de uso y última vez usada

## Formato de API Key
\`\`\`
