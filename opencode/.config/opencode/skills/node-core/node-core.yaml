  ## The Event Loop Deep Dive

  ### The 6 Phases

  ```
  ┌──────────────────────────────────────────────────────────────────┐
  │                        EVENT LOOP                                  │
  └──────────────────────────────────────────────────────────────────┘

       ┌─────────────────────────────────────────────────────────────┐
       │  1. TIMERS (min-heap)                                      │
       │     • setTimeout, setInterval callbacks                     │
       │     • Scheduled callbacks execute here                       │
       └─────────────────────────────────────────────────────────────┘
                              │
                              ▼
       ┌─────────────────────────────────────────────────────────────┐
       │  2. PENDING CALLBACKS (I/O callbacks)                      │
       │     • Some closed sockets/handles callbacks                 │
       │     • Deferred I/O callbacks from previous loop             │
       └─────────────────────────────────────────────────────────────┘
                              │
                              ▼
       ┌─────────────────────────────────────────────────────────────┐
       │  3. IDLE, PREPARE                                          │
       │     • Node.js internal use only                             │
       └─────────────────────────────────────────────────────────────┘
                              │
                              ▼
       ┌─────────────────────────────────────────────────────────────┐
       │  4. POLL (Most Important!)                                 │
       │     • Calculate how long to block for I/O                   │
       │     • Execute I/O callbacks (new I/O)                       │
       │     • If queue not empty → execute all (FIFO)                │
       │     • If queue empty → wait for new callbacks               │
       └─────────────────────────────────────────────────────────────┘
                              │
                              ▼
       ┌─────────────────────────────────────────────────────────────┐
       │  5. CHECK (setImmediate)                                   │
       │     • setImmediate callbacks execute here                   │
       │     • Only runs once per loop iteration                     │
       └─────────────────────────────────────────────────────────────┘
                              │
                              ▼
       ┌─────────────────────────────────────────────────────────────┐
       │  6. CLOSE CALLBACKS                                        │
       │     • socket.on('close') handlers                           │
       │     • Cleanup before next loop iteration                     │
       └─────────────────────────────────────────────────────────────┘
                              │
                              ▼
                    ┌─────────────────┐
                    │  REPEAT (Next   │
                    │  Loop Cycle)    │
                    └─────────────────┘

  ┌──────────────────────────────────────────────────────────────────┐
  │                     MICROTASKS (Higher Priority)                   │
  │                                                                   │
  │   Promises (.then, await) ──▶ MutationObserver ──▶ queueMicrotask │
  └──────────────────────────────────────────────────────────────────┘

  ```

  ### Microtasks vs Macrotasks

  ```typescript
  // Execution Order Demo

  console.log('1. Synchronous code');

  setTimeout(() => {
    console.log('2. setTimeout (Macrotask - Phase: Timers)');
  }, 0);

  Promise.resolve()
    .then(() => {
      console.log('3. Promise .then (Microtask - After current task)');
    });

  queueMicrotask(() => {
    console.log('4. queueMicrotask (Microtask - High priority)');
  });

  process.nextTick(() => {
    console.log('5. process.nextTick (Highest priority - Node only!)');
  });

  // Output order:
  // 1. Synchronous code
  // 5. process.nextTick (highest)
  // 3. Promise .then
  // 4. queueMicrotask
  // 2. setTimeout (last - next event loop)
  ```

  ### Common Pitfalls

  ```typescript
  // BAD: Blocking the Event Loop
  const fs = require('fs');

  // This will BLOCK the entire server!
  const data = fs.readFileSync('/path/to/large/file.txt'); // SYNCHRONOUS!
  console.log(data);

  // GOOD: Non-blocking
  fs.readFile('/path/to/large/file.txt', (err, data) => {
    if (err) throw err;
    console.log(data);
  });

  // GOOD: Async/Await pattern
  import { readFile } from 'fs/promises';

  const data = await readFile('/path/to/large/file.txt');
  console.log(data);
  ```

  ## V8 Engine Deep Dive

  ### Compilation Pipeline

  ```
  ┌─────────────────────────────────────────────────────────────┐
  │                    SOURCE CODE (.js)                         │
  └───────────────────────────┬─────────────────────────────────┘
                              │
                              ▼
  ┌─────────────────────────────────────────────────────────────┐
  │  PARSER ──▶ Abstract Syntax Tree (AST)                       │
  │            │                                                 │
  │            ▼                                                 │
  │  INTERPRETER (Ignition)                                      │
  │            │                                                 │
  │            ▼                                                 │
  │  BYTECODE (Quick interpretation, starts executing)             │
  │            │                                                 │
  │  ┌─────────┴─────────┐                                      │
  │  │                   │                                      │
  │  ▼                   ▼                                      │
  │ HOT FUNCTIONS    COLD FUNCTIONS                              │
  │ (Frequently       (Rarely called)                            │
  │  called)                                                    │
  │  │                   │                                      │
  │  ▼                   │                                      │
  │ OPTIMIZING        De-optimization if                         │
  │ COMPILER          assumptions fail                           │
  │ (TurboFan)                                                    │
  │  │                                                         │
  │  ▼                                                         │
  │ MACHINE CODE (Highly optimized native code)                  │
  └─────────────────────────────────────────────────────────────┘
  ```

  ### Hidden Classes & Inline Caching

  ```typescript
  // GOOD: Consistent structure (enables V8 optimization)
  class User {
    constructor(name, email) {
      this.name = name;      // Added in same order
      this.email = email;    // Same order = hidden class A
    }
  }

  const user1 = new User('Alice', 'alice@example.com');
  const user2 = new User('Bob', 'bob@example.com');
  // V8 creates ONE hidden class, reuses it!

  // BAD: Adding properties in different order
  user1.age = 30;       // New hidden class B
  user2.address = 'NYC'; // Another hidden class C!
  // V8 can't optimize - different hidden classes

  // GOOD: Define all properties in constructor
  class UserOptimized {
    constructor(name, email, age, address) {
      this.name = name;
      this.email = email;
      this.age = age || null;     // Always defined
      this.address = address || null;
    }
  }
  ```

  ## Buffers & Streams

  ### Buffer (Fixed-size binary data)

  ```typescript
  // Creating buffers
  const buf1 = Buffer.alloc(10);          // Zero-filled, 10 bytes
  const buf2 = Buffer.from('Hello');      // From string
  const buf3 = Buffer.from([1, 2, 3]);    // From array
  const buf4 = Buffer.allocUnsafe(10);     // Uninitialized (faster!)

  // Writing to buffer
  buf1.write('Hi', 0, 2);                // Write at offset 0
  buf1.writeInt16LE(12345, 2);            // Little-endian int16

  // Reading from buffer
  console.log(buf1.toString('utf8', 0, 2)); // 'Hi'
  console.log(buf1.readInt16LE(2));        // 12345

  // Buffer operations
  const combined = Buffer.concat([buf1, buf2]); // Concatenate
  const slice = buf1.slice(0, 5);        // Creates view, not copy
  ```

  ### Streams (Piping data without memory overload)

  ```typescript
  import { createReadStream, createWriteStream } from 'fs';
  { Readable, Transform, Writable } from 'stream';
  import { pipeline } from 'stream/promises';

  // BAD: Loading entire file into memory
  const largeFile = await readFile('./large-file.txt');
  process(largeFile);

  // GOOD: Streaming (constant memory usage!)
  const readable = createReadStream('./large-file.txt', {
    highWaterMark: 64 * 1024, // 64KB chunks (default)
    encoding: 'utf8',
  });

  // Custom transform stream
  class UpperCaseTransform extends Transform {
    _transform(chunk: Buffer, encoding: string, callback: Function) {
      this.push(chunk.toString().toUpperCase());
      callback();
    }
  }

  const uppercase = new UpperCaseTransform();
  const writable = createWriteStream('./output.txt');

  // Using pipeline (automatic error handling!)
  await pipeline(
    readable,
    uppercase,
    writable
  );

  console.log('Stream pipeline completed!');
  ```

  ## Event Emitters (The Foundation of Node.js)

  ```typescript
  import { EventEmitter } from 'events';

  // Custom EventEmitter
  class NotificationService extends EventEmitter {
    async sendNotification(userId: string, message: string) {
      console.log(`Sending to ${userId}: ${message}`);
      
      this.emit('notification:sent', { userId, message });
      
      if (Math.random() > 0.9) {
        this.emit('notification:failed', { userId, error: 'Network error' });
      }
    }
  }

  const notifications = new NotificationService();

  // Event listeners
  notifications.on('notification:sent', (data) => {
    console.log(`✓ Sent: ${data.userId}`);
  });

  notifications.on('notification:failed', (data) => {
    console.error(`✗ Failed: ${data.userId} - ${data.error}`);
  });

  // Once (one-time listener)
  notifications.once('notification:sent', () => {
    console.log('First notification sent!');
  });

  // Emit events
  notifications.sendNotification('user1', 'Hello!');
  notifications.sendNotification('user2', 'World!');

  // Error handling (CRITICAL!)
  notifications.on('error', (err) => {
    console.error('Unhandled error:', err);
  });
  ```

  ## Worker Threads (CPU-Intensive Tasks)

  ```typescript
  // worker.ts (runs in separate thread)
  import { parentPort, workerData } from 'worker_threads';

  // Expensive CPU calculation
  function fibonacci(n: number): number {
    if (n <= 1) return n;
    return fibonacci(n - 1) + fibonacci(n - 2);
  }

  const result = fibonacci(workerData.n);

  // Send result back to main thread
  parentPort.postMessage({ result });

  // main.ts
  import { Worker, isMainThread, parentPort } from 'worker_threads';

  if (isMainThread) {
    // Create worker
    const worker = new Worker('./worker.ts', {
      workerData: { n: 40 }, // Calculate fib(40)
    });

    worker.on('message', ({ result }) => {
      console.log(`Fibonacci result: ${result}`); // 102334155
    });

    worker.on('error', (error) => {
      console.error('Worker error:', error);
    });

    worker.on('exit', (code) => {
      console.log(`Worker exited with code ${code}`);
    });

    // Terminate if needed
    // worker.terminate();
  }
  ```

  ### Worker Thread Pool (MessageChannel)

  ```typescript
  import { Worker, parentPort, workerData } from 'worker_threads';

  class WorkerPool {
    private workers: Worker[] = [];
    private queue: Array<{
      data: any;
      resolve: Function;
      reject: Function;
    }> = [];
    private readonly maxWorkers: number;

    constructor(maxWorkers: number = navigator.hardwareConcurrency || 4) {
      this.maxWorkers = maxWorkers;
    }

    async run<T>(data: any): Promise<T> {
      return new Promise((resolve, reject) => {
        this.queue.push({ data, resolve, reject });
        this.processQueue();
      });
    }

    private processQueue() {
      if (this.queue.length === 0) return;
      if (this.workers.length >= this.maxWorkers) return;

      const { data, resolve, reject } = this.queue.shift()!;

      const worker = new Worker(__filename, {
        workerData: data,
      });

      worker.on('message', resolve);
      worker.on('error', reject);
      worker.on('exit', (code) => {
        const index = this.workers.indexOf(worker);
        if (index > -1) this.workers.splice(index, 1);
        this.processQueue();
      });

      this.workers.push(worker);
    }
  }
  ```

  ## Cluster Module (Multi-Core Utilization)

  ```typescript
  import cluster from 'cluster';
  import { cpus } from 'os';
  import { createServer } from 'http';

  const numCPUs = cpus().length;

  if (cluster.isPrimary) {
    console.log(`Primary ${process.pid} is running`);

    // Fork workers
    for (let i = 0; i < numCPUs; i++) {
      cluster.fork();
    }

    // Handle worker deaths
    cluster.on('exit', (worker, code, signal) => {
      console.log(`Worker ${worker.process.pid} died`);
      // Fork a replacement
      cluster.fork();
    });

    // Optional: Worker-specific logging
    cluster.on('listening', (worker, address) => {
      console.log(`Worker ${worker.process.pid} listening on ${address.port}`);
    });

  } else {
    // Worker process
    const server = createServer((req, res) => {
      res.writeHead(200);
      res.end(`Response from worker ${process.pid}\n`);
    });

    server.listen(3000, () => {
      console.log(`Worker ${process.pid} started`);
    });
  }
  ```

  ### PM2-Style Clustering (Production Ready)

  ```typescript
  import cluster from 'cluster';
  import { cpus } from 'os';
  import http from 'http';

  const WORKER_COUNT = process.env.WORKERS
    ? parseInt(process.env.WORKERS)
    : cpus().length;

  if (cluster.isPrimary) {
    // Fork workers with load balancing (round-robin)
    for (let i = 0; i < WORKER_COUNT; i++) {
      cluster.fork();
    }

    // Graceful shutdown
    process.on('SIGTERM', () => {
      console.log('Received SIGTERM, shutting down gracefully...');
      
      // Stop accepting new connections
      for (const id in cluster.workers) {
        cluster.workers[id]!.kill();
      }
    });

    // Fork again on crash
    cluster.on('exit', (worker, code, signal) => {
      if (code !== 0 && !worker.exitedAfterDisconnect) {
        console.log(`Worker ${worker.id} crashed, spawning new one`);
        cluster.fork();
      }
    });

  } else {
    // HTTP server (each worker handles connections)
    const server = http.createServer((req, res) => {
      res.writeHead(200);
      res.end(`Handled by worker ${process.pid}\n`);
    });

    server.listen(3000, () => {
      console.log(`Worker ${process.pid} ready`);
    });
  }
  ```

  ## Child Processes

  ```typescript
  import { spawn, exec, execFile, fork } from 'child_process';

  // spawn: Returns stream, good for large outputs
  const child = spawn('find', ['.', '-type', 'f']);
  
  child.stdout.on('data', (data) => {
    console.log(`stdout: ${data}`);
  });

  child.stderr.on('data', (data) => {
    console.error(`stderr: ${data}`);
  });

  child.on('close', (code) => {
    console.log(`child process exited with code ${code}`);
  });

  // exec: For small outputs (max 512KB), shell parsing
  exec('find . -type f', (error, stdout, stderr) => {
    if (error) {
      console.error(`exec error: ${error}`);
      return;
    }
    console.log(stdout);
  });

  // fork: Spawn Node.js processes with IPC channel
  // parent.ts
  const forked = fork('./child.js');
  
  forked.send({ hello: 'world' });
  
  forked.on('message', (msg) => {
    console.log('Message from child:', msg);
  });

  // child.js
  process.on('message', (msg) => {
    console.log('Message from parent:', msg);
    process.send({ result: 'processed' });
  });
  ```

  ## Native Fetch (Node.js 18+)

  ```typescript
  // Native fetch (no more axios/express-http，完全不需要!)
  const response = await fetch('https://api.example.com/data', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
    },
    body: JSON.stringify({ key: 'value' }),
    signal: AbortSignal.timeout(5000), // 5 second timeout
  });

  if (!response.ok) {
    throw new Error(`HTTP error! status: ${response.status}`);
  }

  const data = await response.json();

  // Streaming responses
  const response2 = await fetch('https://api.example.com/large-file');
  const reader = response2.body?.getReader();
  const decoder = new TextDecoder();

  while (reader) {
    const { done, value } = await reader.read();
    if (done) break;
    
    const chunk = decoder.decode(value, { stream: true });
    process.stdout.write(chunk);
  }
  ```

  ## Native Test Runner (Node.js 20+)

  ```typescript
  // math.test.ts
  import { describe, it, before, after, beforeEach, afterEach } from 'node:test';
  import assert from 'node:assert';

  function add(a: number, b: number): number {
    return a + b;
  }

  describe('Math functions', () => {
    it('should add two numbers', () => {
      assert.strictEqual(add(2, 3), 5);
    });

    it('should handle negative numbers', () => {
      assert.strictEqual(add(-1, 1), 0);
    });
  });

  // Mocking with test.mock
  import { mock, describe, it } from 'node:test';

  describe('API calls', () => {
    it('should mock fetch', async () => {
      mock.method(globalThis, 'fetch', async () => {
        return new Response(JSON.stringify({ test: true }));
      });

      const res = await fetch('https://example.com');
      const data = await res.json();
      
      assert.strictEqual(data.test, true);
      mock.restoreAll();
    });
  });

  // Run tests
  // node --test math.test.ts
  ```

