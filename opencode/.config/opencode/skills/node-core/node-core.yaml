  ## The Node.js Architecture

  ```
  ┌─────────────────────────────────────────────────────────────────┐
  │                      Your JavaScript Code                         │
  └───────────────────────────┬─────────────────────────────────────┘
                              │
                              ▼
  ┌─────────────────────────────────────────────────────────────────┐
  │                          V8 Engine                               │
  │  ┌─────────────────┐    ┌─────────────────┐                      │
  │  │   Parse         │───▶│   Compile      │───▶│   Ignition    │
  │  │   (AST)         │    │   (TurboFan)   │    │   (Bytecode)  │
  │  └─────────────────┘    └─────────────────┘    └─────────────────┘ │
  └───────────────────────────┬─────────────────────────────────────┘
                              │
                              ▼
  ┌─────────────────────────────────────────────────────────────────┐
  │                         Libuv                                    │
  │  ┌───────────────────────────────────────────────────────────┐   │
  │  │                    Event Loop                             │   │
  │  │  ┌─────────┐  ┌──────────┐  ┌─────────┐  ┌─────────┐  │   │
  │  │  │ Timers  │──▶│ Pending  │──▶│  Poll   │──▶│  Check  │  │   │
  │  │  └─────────┘  └──────────┘  └─────────┘  └─────────┘  │   │
  │  │        │              │              │          │       │   │
